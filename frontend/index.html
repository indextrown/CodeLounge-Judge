<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>코드라운지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="./index.html">
          <span class="brand-mark">C</span>
          <span class="brand-text">
            <strong>코드라운지</strong>
            <small>Swift + C++ Online Judge</small>
          </span>
        </a>
      </header>

      <main class="view">
        <div class="hero-card">
          <div>
            <p class="section-kicker">문제 목록</p>
            <h1>백준처럼 문제를 고르고 바로 풀어보는 연습장</h1>
            <p class="hero-copy">문제 번호와 제목을 눌러 상세 페이지로 이동한 뒤, C++ 또는 Swift로 바로 제출할 수 있습니다.</p>
          </div>
          <div class="hero-stats">
            <div class="stat-card">
              <span>Problems</span>
              <strong id="problemCount">0</strong>
            </div>
            <div class="stat-card">
              <span>Supported</span>
              <strong>C++ / Swift</strong>
            </div>
          </div>
        </div>

        <section class="table-panel">
          <div class="table-header">
            <h2>전체 문제</h2>
            <p>문제 셀을 클릭하면 상세 풀이 화면으로 이동합니다.</p>
          </div>
          <div class="table-wrap">
            <table class="problem-table">
              <thead>
                <tr>
                  <th>번호</th>
                  <th>제목</th>
                  <th>설명</th>
                  <th>시간 제한</th>
                  <th>메모리 제한</th>
                </tr>
              </thead>
              <tbody id="problemTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="./shared.js"></script>
    <script src="./list.js"></script>
  </body>
  </html>
