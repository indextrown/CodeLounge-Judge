<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>코드라운지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="./index.html">
          <span class="brand-mark">C</span>
          <span class="brand-text">
            <strong>코드라운지</strong>
            <small>Swift + C++ Online Judge</small>
          </span>
        </a>
        <div id="topbarAuth" class="topbar-auth"></div>
      </header>

      <main class="view">
        <div class="hero-card">
          <div>
            <p class="section-kicker">문제 목록</p>
            <h1>백준처럼 문제를 고르고 바로 풀어보는 연습장</h1>
            <p class="hero-copy">회원은 문제별로 내 코드를 저장하고 이어서 풀 수 있고, 비회원은 문제 목록만 둘러볼 수 있습니다.</p>
          </div>
          <div class="hero-stats">
            <div class="stat-card">
              <span>Problems</span>
              <strong id="problemCount">0</strong>
            </div>
            <div class="stat-card">
              <span>Supported</span>
              <strong>C++ / Swift</strong>
            </div>
          </div>
        </div>

        <section id="authMessagePanel" class="table-panel auth-message-panel hidden">
          <div class="table-header">
            <h2>회원 상태</h2>
            <p id="authMessageText">로그인 상태를 확인하는 중입니다.</p>
          </div>
        </section>

        <section class="table-panel">
          <div class="table-header">
            <h2>전체 문제</h2>
            <p>회원은 상세 풀이 화면에서 저장된 코드와 함께 이어서 풀이할 수 있습니다.</p>
          </div>
          <div class="table-wrap">
            <table class="problem-table">
              <thead>
                <tr>
                  <th>번호</th>
                  <th>제목</th>
                  <th>설명</th>
                  <th>시간 제한</th>
                  <th>메모리 제한</th>
                </tr>
              </thead>
              <tbody id="problemTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div id="authModal" class="auth-modal hidden" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
      <div class="auth-modal-backdrop" data-close-auth-modal="true"></div>
      <div class="auth-modal-card">
        <div class="auth-modal-head">
          <div>
            <p class="section-kicker">계정</p>
            <h2 id="authModalTitle">로그인</h2>
          </div>
          <button id="closeAuthModalButton" class="secondary-button" type="button">닫기</button>
        </div>
        <div class="auth-modal-tabs" role="tablist" aria-label="auth tabs">
          <button id="showLoginTabButton" class="auth-tab-button is-active" type="button">로그인</button>
          <button id="showSignupTabButton" class="auth-tab-button" type="button">회원가입</button>
        </div>
        <div id="authModalPanels">
          <form id="loginForm" class="auth-form auth-modal-form">
            <label>
              <span>아이디</span>
              <input id="loginUsername" name="username" autocomplete="username" placeholder="3~24자, 영문/숫자/_">
            </label>
            <label>
              <span>비밀번호</span>
              <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="비밀번호 입력">
            </label>
            <button class="primary-button" type="submit">로그인</button>
          </form>

          <form id="signupForm" class="auth-form auth-modal-form hidden">
            <label>
              <span>아이디</span>
              <input id="signupUsername" name="username" autocomplete="username" placeholder="3~24자, 영문/숫자/_">
            </label>
            <label>
              <span>비밀번호</span>
              <input id="signupPassword" name="password" type="password" autocomplete="new-password" placeholder="6자 이상">
            </label>
            <button class="primary-button" type="submit">회원가입</button>
          </form>
        </div>
      </div>
    </div>

    <script src="./shared.js"></script>
    <script src="./list.js"></script>
  </body>
  </html>
