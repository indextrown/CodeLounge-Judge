<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>문제 풀이 V3 - 코드라운지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./styles-v2.css">
    <link rel="stylesheet" href="./styles-v3.css">
  </head>
  <body class="v2-body v3-body">
    <div class="v2-shell v3-shell">
      <header class="v2-topbar v3-topbar">
        <a class="v2-brand" href="./index.html">
          <span class="v2-brand-mark">C</span>
          <span class="v2-brand-copy">
            <strong>코드라운지</strong>
            <small>Problem Detail V3</small>
          </span>
        </a>
        <nav class="v2-nav">
          <a href="./index.html">문제 목록</a>
          <a href="./problemv1.html?id=1001">V1 보기</a>
          <a href="./problemv2.html?id=1001">V2 보기</a>
          <a class="is-active" href="#">상세 V3</a>
        </nav>
      </header>

      <main class="v2-main">
        <section class="v2-hero v3-hero">
          <div class="v2-hero-copy">
            <nav class="breadcrumb v2-breadcrumb">
              <a href="./index.html">문제 목록</a>
              <span>/</span>
              <span id="breadcrumbLabel">문제</span>
            </nav>
            <p class="section-kicker">Problem Detail V3</p>
            <h1 id="problemTitle">문제를 불러오는 중...</h1>
            <p id="problemDescription" class="v2-subcopy"></p>
            <div class="v2-meta-row">
              <span id="problemTime" class="v2-meta-pill"></span>
              <span id="problemMemory" class="v2-meta-pill"></span>
              <span id="caseCount" class="v2-meta-pill subtle"></span>
            </div>
          </div>
          <aside class="v2-hero-side">
            <div class="v2-status-stack">
              <div class="v2-status-card">
                <span class="eyebrow-small">현재 상태</span>
                <span id="statusBadge" class="status-badge idle">READY</span>
              </div>
              <div class="v2-status-card">
                <span class="eyebrow-small">에디터</span>
                <strong>CodeMirror</strong>
              </div>
            </div>
          </aside>
        </section>

        <section class="v3-layout">
          <section class="v3-main-column">
            <article class="v2-panel v2-statement-panel">
              <div class="v2-panel-head">
                <h2>문제 설명</h2>
              </div>
              <div id="statementVisualCard" class="v2-visual-card hidden">
                <img id="problemImage" class="v2-problem-image hidden" alt="문제 이미지">
              </div>
              <p id="statementBody" class="v2-statement-text"></p>
              <div class="v2-io-grid">
                <section class="v2-mini-card">
                  <h3>입력</h3>
                  <p id="inputGuide">각 테스트케이스의 입력은 아래 예제 입력 카드에서 확인할 수 있습니다.</p>
                </section>
                <section class="v2-mini-card">
                  <h3>출력</h3>
                  <p id="outputGuide">각 테스트케이스의 기대 출력은 아래 예제 출력 카드에서 확인할 수 있습니다.</p>
                </section>
              </div>
            </article>

            <article class="v2-panel v2-cases-panel">
              <div class="v2-panel-head">
                <h2>테스트 케이스</h2>
              </div>
              <div id="casesList" class="v2-case-grid"></div>
            </article>
          </section>

          <aside class="v3-editor-column">
            <article class="v2-panel v3-editor-panel">
              <div class="v2-panel-head">
                <h2>코드 제출</h2>
                <div class="workspace-actions">
                  <select id="languageSelect">
                    <option value="cpp">C++</option>
                    <option value="swift" selected>Swift</option>
                  </select>
                  <button id="runButton" class="v2-primary-button">채점하기</button>
                </div>
              </div>

              <div class="v3-toolbar">
                <div class="v3-toggle-group" role="group" aria-label="highlight toggle">
                  <button id="plainModeButton" class="v3-toggle-button" type="button">Plain</button>
                  <button id="highlightModeButton" class="v3-toggle-button is-active" type="button">Highlight</button>
                </div>
                <div class="v3-toggle-group" role="group" aria-label="theme toggle">
                  <button id="lightThemeButton" class="v3-toggle-button is-active" type="button">Light</button>
                  <button id="darkThemeButton" class="v3-toggle-button" type="button">Dark</button>
                </div>
              </div>

              <div class="v3-editor-frame">
                <div id="codeEditor" class="v3-code-editor"></div>
              </div>
            </article>

            <article class="v2-panel v2-result-panel">
              <div class="v2-panel-head">
                <h2>채점 결과</h2>
              </div>
              <div id="summary" class="summary-card"></div>
              <div id="compileLog" class="log-card hidden"></div>
              <div id="resultsList" class="v2-results-list"></div>
            </article>
          </aside>
        </section>
      </main>
    </div>

    <script src="./shared.js"></script>
    <script type="module" src="./problemv3.js"></script>
  </body>
  </html>
