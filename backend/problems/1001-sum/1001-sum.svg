<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A plus B sample illustration</title>
  <desc id="desc">Two number cards flowing into a result card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf4fb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#23486f"/>
      <stop offset="100%" stop-color="#5d94cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#2c507d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="640" rx="36" fill="url(#bg)"/>
  <circle cx="210" cy="152" r="110" fill="#d7e6f7"/>
  <circle cx="1010" cy="502" r="92" fill="#dfeaf8"/>
  <path d="M190 368 C320 290 435 286 565 368" fill="none" stroke="#7fa0c5" stroke-width="10" stroke-dasharray="18 18" stroke-linecap="round"/>
  <path d="M640 368 C770 286 885 290 1015 368" fill="none" stroke="#7fa0c5" stroke-width="10" stroke-dasharray="18 18" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="120" y="210" width="200" height="200" rx="34" fill="url(#card)"/>
    <rect x="500" y="210" width="200" height="200" rx="34" fill="url(#card)"/>
    <rect x="880" y="170" width="220" height="280" rx="40" fill="#111111"/>
  </g>
  <text x="220" y="300" text-anchor="middle" font-size="74" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">A</text>
  <text x="600" y="300" text-anchor="middle" font-size="74" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">B</text>
  <text x="990" y="272" text-anchor="middle" font-size="54" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">A + B</text>
  <text x="990" y="352" text-anchor="middle" font-size="114" font-family="Arial, sans-serif" font-weight="800" fill="#ffffff">3</text>
  <circle cx="410" cy="310" r="50" fill="#f8fbff" stroke="#bfd2e7" stroke-width="10"/>
  <rect x="387" y="258" width="46" height="104" rx="10" fill="#23486f"/>
  <rect x="358" y="287" width="104" height="46" rx="10" fill="#23486f"/>
  <path d="M760 308 h74" stroke="#23486f" stroke-width="18" stroke-linecap="round"/>
</svg>
